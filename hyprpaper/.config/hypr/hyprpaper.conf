# Caleb's Hyprpaper Configuration
# Managed by GNU Stow from ~/.files/hyprpaper/.config/hypr/hyprpaper.conf
#
# NOTE: swww is installed as an alternative for animated wallpapers.
# To switch to swww when you have animated wallpapers:
#   1. In hyprland.conf, replace `exec-once = hyprpaper` with `exec-once = swww-daemon`
#   2. Set wallpaper: swww img ~/Pictures/your-animated-wallpaper.gif
#   3. swww supports GIF, MP4, and static images with smooth transitions

# Preload wallpapers
# Add your wallpaper paths here
preload = ~/Pictures/wallpaper.jpg
# preload = ~/Pictures/wallpaper2.jpg

# Set wallpaper for each monitor
# Syntax: wallpaper = monitor,path
wallpaper = ,~/Pictures/wallpaper.jpg

# Optional: Set different wallpapers for different monitors
# wallpaper = DP-1,~/Pictures/wallpaper.jpg
# wallpaper = HDMI-A-1,~/Pictures/wallpaper2.jpg

# Disable splash text rendering
splash = false

# Enable IPC (allows changing wallpaper on the fly)
ipc = on
