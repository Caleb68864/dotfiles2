# Caleb's Hyprpaper Configuration
# Managed by GNU Stow from ~/dotfiles/hyprpaper/.config/hypr/hyprpaper.conf
#
# Initial wallpaper: EndeavourOS system wallpaper (fallback)
# random-wallpaper.sh replaces this on boot if ~/Pictures/Wallpapers/ has images.
#
# To add wallpapers: drop images into ~/Pictures/Wallpapers/
# Supported formats: jpg, jpeg, png, webp

# Preload fallback wallpaper
preload = /usr/share/wallpapers/EndeavourOS/contents/screenshot.png

# Set wallpaper for all monitors (random-wallpaper.sh overrides this on boot)
wallpaper = ,/usr/share/wallpapers/EndeavourOS/contents/screenshot.png

# Disable splash text rendering
splash = false

# Enable IPC (required for random-wallpaper.sh to change wallpaper at runtime)
ipc = on
