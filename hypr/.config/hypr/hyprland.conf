windowrulev2 = workspace 7 silent,class:^(Heroic)$

# Ignore maximize requests
windowrule = suppressevent maximize,class:.*

# Fix XWayland dragging issues
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Layer rules (for waybar blur)
layerrule = blur,waybar
layerrule = ignorezero,waybar

# ============================================================================
# Key Bindings
# ============================================================================
$mainMod = SUPER

# Applications
bind = $mainMod, return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, exec, $webbrowser
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, N, exec, swaync-client -t -sw  # Toggle notification center

# Window management
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, return, layoutmsg, swapwithmaster  # Swap with master window
bind = $mainMod, T, exec, hyprctl keyword general:layout $([[ $(hyprctl getoption general:layout | grep -oP '(?<=str: )\w+') == "dwindle" ]] && echo "master" || echo "dwindle")  # Toggle layout

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Focus - Arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows - SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize windows - CTRL + arrow keys
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50

# Workspaces
# Standard workspace bindings (comment out when using hyprtags)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Hyprtags: Switch to tag (uncomment after installing hyprtags plugin)
