windowrulev2 = opacity 1.0 1.0,class:^(firefox)$
windowrulev2 = opacity 1.0 1.0,class:^(vivaldi-stable)$
windowrulev2 = opacity 1.0 1.0,class:^(Vivaldi-stable)$
windowrulev2 = opacity 1.0 1.0,class:^(chromium)$
windowrulev2 = opacity 0.95 0.85,class:^(thunar)$
windowrulev2 = opacity 0.95 0.85,class:^(dolphin)$
windowrulev2 = opacity 0.95 0.85,class:^(org.kde.dolphin)$
windowrulev2 = opacity 1.0 1.0,class:^(vlc)$
windowrulev2 = opacity 1.0 1.0,class:^(mpv)$
windowrulev2 = opacity 1.0 1.0,class:^(Spotify)$

# Float rules
