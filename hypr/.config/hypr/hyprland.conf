# Caleb's Hyprland Configuration
# Managed by GNU Stow from ~/.files/hypr/.config/hypr/hyprland.conf

# ============================================================================
# Plugin Configs
# ============================================================================
# Source hyprtags dispatchers (uncomment after installing hyprtags plugin)
#source = /tmp/hyprtags.conf

# ============================================================================
# Monitor Configuration
# ============================================================================
monitor=,preferred,auto,auto

# ============================================================================
# Programs
# ============================================================================
$terminal = kitty
$fileManager = dolphin
$webbrowser = vivaldi
$menu = wofi --show drun

# ============================================================================
# Autostart
# ============================================================================
# Load Hyprland plugins
exec-once = hyprpm reload -n

# Desktop environment
exec-once = waybar & hyprpaper
exec-once = swaync
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Applications
exec-once = steam -silent
exec-once = heroic
exec-once = discord --start-minimized

# ============================================================================
# Environment Variables
# ============================================================================
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# NVIDIA (uncomment if using NVIDIA)
# env = LIBVA_DRIVER_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_NO_HARDWARE_CURSORS,1

# ============================================================================
# Input Configuration
# ============================================================================
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = false
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }

    sensitivity = 0  # -1.0 - 1.0, 0 means no modification
}

# ============================================================================
# General Settings
# ============================================================================
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(414868aa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# ============================================================================
# Decoration
# ============================================================================
decoration {
    rounding = 10

    # Opacity
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Shadow
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(15161eee)
    }

    # Blur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

# ============================================================================
# Animations
# ============================================================================
animations {
    enabled = true

    # Bezier curves
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Animations
    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# ============================================================================
# Layouts
# ============================================================================
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
    orientation = left
}

# ============================================================================
# Gestures
# ============================================================================
gestures {
}

# ============================================================================
# Miscellaneous
# ============================================================================
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    enable_swallow = true
    swallow_regex = ^(kitty|alacritty)$
}

