# Caleb's Hypridle Configuration
# Managed by GNU Stow from ~/.files/hypridle/.config/hypr/hypridle.conf

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display
}

# Dim screen after 5 minutes
listener {
    timeout = 300                                # 5 minutes
    on-timeout = brightnessctl -s set 10%        # save current brightness and dim to 10%
    on-resume = brightnessctl -r                 # restore brightness
}

# Lock screen after 10 minutes
listener {
    timeout = 600                                # 10 minutes
    on-timeout = loginctl lock-session           # lock screen when timeout has passed
}

# Turn off screen after 10.5 minutes (30 seconds after lock)
listener {
    timeout = 630                                # 10.5 minutes
    on-timeout = hyprctl dispatch dpms off       # screen off
    on-resume = hyprctl dispatch dpms on         # screen on when activity is detected after timeout has fired
}

# Turn off keyboard backlight after 10.5 minutes
listener {
    timeout = 630                                # 10.5 minutes
    on-timeout = brightnessctl -sd kbd_backlight set 0    # turn off keyboard backlight
    on-resume = brightnessctl -rd kbd_backlight            # turn on keyboard backlight
}
