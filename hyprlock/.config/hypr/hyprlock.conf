# Caleb's Hyprlock Configuration
# Managed by GNU Stow from ~/.files/hyprlock/.config/hypr/hyprlock.conf
# Theme: Tokyo Night

# General
general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# Background
background {
    monitor =
    path = ~/Pictures/wallpaper.jpg
    color = rgba(26, 27, 38, 1.0)
    blur_passes = 3
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(169, 177, 214, 1.0)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(122, 162, 247, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(122, 162, 247, 1.0)
    inner_color = rgba(26, 27, 38, 0.9)
    font_color = rgba(192, 202, 245, 1.0)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Password</i>
    hide_input = false
    rounding = 8
    check_color = rgba(158, 206, 106, 1.0)
    fail_color = rgba(247, 118, 142, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgba(224, 175, 104, 1.0)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false

    position = 0, -120
    halign = center
    valign = center
}
