# Caleb's Tmux Configuration
# Managed by GNU Stow from ~/.files/tmux/.tmux.conf

# ============================================================================
# General Settings
# ============================================================================

# Set prefix to Ctrl-a (more comfortable than Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Set default terminal
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# Refresh status more often
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Faster command sequences
set -s escape-time 0

# ============================================================================
# Key Bindings
# ============================================================================

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Create new window
bind c new-window -c "#{pane_current_path}"

# ============================================================================
# Vi Mode
# ============================================================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"

# ============================================================================
# Theme (Gruvbox Dark)
# ============================================================================

# Status bar colors
set -g status-style bg=#282828,fg=#ebdbb2

# Window status
setw -g window-status-style fg=#bdae93,bg=#282828
setw -g window-status-current-style fg=#fabd2f,bg=#3c3836,bold

# Pane border
set -g pane-border-style fg=#3c3836
set -g pane-active-border-style fg=#fabd2f

# Message text
set -g message-style bg=#fabd2f,fg=#282828

# Pane number display
set -g display-panes-active-colour "#fabd2f"
set -g display-panes-colour "#bdae93"

# Clock mode
setw -g clock-mode-colour "#fabd2f"

# ============================================================================
# Status Bar
# ============================================================================

set -g status-position bottom
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 100

# Left status
set -g status-left "#[fg=#282828,bg=#fabd2f,bold] 󰍹 #S #[fg=#fabd2f,bg=#282828]"

# Right status
set -g status-right "#[fg=#3c3836,bg=#282828]#[fg=#ebdbb2,bg=#3c3836] %Y-%m-%d #[fg=#ebdbb2,bg=#3c3836]#[fg=#ebdbb2,bg=#3c3836]  %H:%M #[fg=#fabd2f,bg=#3c3836]#[fg=#282828,bg=#fabd2f,bold]  #H "

# Window status format
setw -g window-status-format "#[fg=#bdae93,bg=#282828] #I: #W "
setw -g window-status-current-format "#[fg=#282828,bg=#3c3836]#[fg=#fabd2f,bg=#3c3836,bold] #I: #W #[fg=#3c3836,bg=#282828]"

