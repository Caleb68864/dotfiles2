# Caleb's Tmux Configuration
# Managed by GNU Stow from ~/dotfiles/tmux/.tmux.conf

# ============================================================================
# General Settings
# ============================================================================

# Set prefix to Ctrl-a (more comfortable than Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Set default terminal - use tmux-256color for better compatibility
set -g default-terminal "tmux-256color"
# Enable truecolor support for various terminal types
set -ga terminal-overrides ",*256col*:Tc"
# Disable color queries that cause garbled output over SSH
set -ga terminal-overrides ",*:Ms=\\E]52;%p1%s;%p2%s\\007"
set -g allow-passthrough off

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# Refresh status more often
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Faster command sequences
set -s escape-time 0

# ============================================================================
# Key Bindings
# ============================================================================

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching with awareness of Vim splits (vim-tmux-navigator)
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Create new window
bind c new-window -c "#{pane_current_path}"

# ============================================================================
# Vi Mode
# ============================================================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"

# ============================================================================
# Theme (Tokyo Night)
# ============================================================================

# Status bar colors
set -g status-style bg=#1a1b26,fg=#c0caf5

# Window status
setw -g window-status-style fg=#a9b1d6,bg=#1a1b26
setw -g window-status-current-style fg=#7aa2f7,bg=#24283b,bold

# Pane border
set -g pane-border-style fg=#414868
set -g pane-active-border-style fg=#7aa2f7

# Message text
set -g message-style bg=#7aa2f7,fg=#1a1b26

# Pane number display
set -g display-panes-active-colour "#7aa2f7"
set -g display-panes-colour "#a9b1d6"

# Clock mode
setw -g clock-mode-colour "#7aa2f7"

# ============================================================================
# Status Bar
# ============================================================================

set -g status-position bottom
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 100

# Left status
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] 󰍹 #S #[fg=#c0caf5,bg=#1a1b26]"

# Right status
set -g status-right "#[fg=#c0caf5,bg=#24283b] %Y-%m-%d #[fg=#c0caf5,bg=#24283b] %H:%M #[fg=#1a1b26,bg=#7aa2f7,bold]  #H "

# Window status format
setw -g window-status-format "#[fg=#a9b1d6,bg=#1a1b26] #I: #W "
setw -g window-status-current-format "#[fg=#7aa2f7,bg=#24283b,bold] #I: #W "

# ============================================================================
# Plugins (TPM - Tmux Plugin Manager)
# ============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: restore vim/nvim sessions too
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Continuum: auto-save every 15 minutes, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
